<html>

<head>
    <title>smalltalk.js</title>

    <!-- 
      [ ] replace .active with :focus-within ?
      [ ] move order of windows
    -->

    <style>
        @font-face {
            font-family: InterVariable;
            font-style: normal;
            font-weight: 100 900;
            font-display: swap;
            src: url("font/InterVariable.woff2") format("woff2");
        }

        @font-face {
            font-family: InterVariable;
            font-style: italic;
            font-weight: 100 900;
            font-display: swap;
            src: url("font/InterVariable-Italic.woff2") format("woff2");
        }

        :root {
            font-size: 100%;
            text-size-adjust: none;
            -webkit-text-size-adjust: none;
            font-family: "Inter", sans-serif;

            --wm-frame-nw: #ffffff;
            --wm-frame-se: #989898;
            --wm-frame-bg: #e8e8e8;

            --wm-frame-nw-active: #fcfc64;
            --wm-frame-se-active: #986400;
            --wm-frame-bg-active: #fcc800;

        }

        @supports (font-variation-settings: normal) {
            :root {
                font-family: "InterVariable", sans-serif;
                font-optical-sizing: auto;
            }
        }

        body {
            font-weight: 300;
            background-color: #3060a0;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        .wm-frame {
            position: absolute;
            background-color: rgba(0, 0, 0, 0);
        }

        .wm-shadow {
            position: absolute;
            top: 20px;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .wm-frame>.wm-titlebar,
        .wm-frame>.wm-titlebar-shadow {
            position: absolute;
            top: 1px;
            cursor: move;
            margin: 0;
            font-size: calc((12/16) * 1rem);
            height: 17px;
            font-weight: 500;
            padding: 1px 4px 1px 4px;
            background-color: var(--wm-frame-bg);
            border-top: var(--wm-frame-nw) 1px solid;
            border-left: var(--wm-frame-nw) 1px solid;
            border-right: var(--wm-frame-se) 1px solid;
            border-bottom: none;
        }

        .wm-frame.active>.wm-titlebar {
            background-color: var(--wm-frame-bg-active);
            border-top: var(--wm-frame-nw-active) 1px solid;
            border-left: var(--wm-frame-nw-active) 1px solid;
            border-right: var(--wm-frame-se-active) 1px solid;
        }

        .wm-frame.active>.wm-titlebar-shadow {
            box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.3);
        }



        .wm-frame.active>.wm-shadow {
            box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.3);
        }

        .wm-frame>.wm-child {
            position: absolute;
            left: 3px;
            top: 23px;
            right: 3px;
            bottom: 3px;
        }

        .wm-frame>.wm-border {
            background-color: var(--wm-frame-bg);
        }

        .wm-frame.active>.wm-border {
            background-color: var(--wm-frame-bg-active);
        }

        .wm-frame>.wm-nw {
            position: absolute;
            top: 20px;
            left: 0;
            width: 16px;
            height: 16px;
            border-top: var(--wm-frame-nw) 1px solid;
            border-left: var(--wm-frame-nw) 1px solid;
            cursor: nw-resize;
        }

        .wm-frame.active>.wm-nw {
            border-top: var(--wm-frame-nw-active) 1px solid;
            border-left: var(--wm-frame-nw-active) 1px solid;
        }

        .wm-frame>.wm-n {
            position: absolute;
            top: 20px;
            left: 16;
            right: 16px;
            height: 16px;
            border-top: var(--wm-frame-nw) 1px solid;
            cursor: n-resize;
        }

        .wm-frame.active>.wm-n {
            border-top: var(--wm-frame-nw-active) 1px solid;
        }

        .wm-frame>.wm-ne {
            position: absolute;
            top: 20px;
            width: 16px;
            right: 0px;
            height: 16px;
            border-top: var(--wm-frame-nw) 1px solid;
            border-right: var(--wm-frame-se) 1px solid;
            cursor: ne-resize;
        }

        .wm-frame.active.wm-ne {
            border-top: var(--wm-frame-nw-active) 1px solid;
            border-right: var(--wm-frame-se-active) 1px solid;
        }

        .wm-frame>.wm-e {
            position: absolute;
            top: 36px;
            width: 16px;
            right: 0px;
            bottom: 16px;
            border-right: var(--wm-frame-se) 1px solid;
            cursor: e-resize;
        }

        .wm-frame.active>.wm-e {
            border-right: var(--wm-frame-se-active) 1px solid;
        }

        .wm-frame>.wm-se {
            position: absolute;
            height: 16px;
            width: 16px;
            right: 0px;
            bottom: 0px;
            border-right: var(--wm-frame-se) 1px solid;
            border-bottom: var(--wm-frame-se) 1px solid;
            cursor: se-resize;
        }

        .wm-frame.active>.wm-se {
            border-right: var(--wm-frame-se-active) 1px solid;
            border-bottom: var(--wm-frame-se-active) 1px solid;
        }

        .wm-frame>.wm-s {
            position: absolute;
            height: 16px;
            left: 16px;
            right: 16px;
            bottom: 0px;
            border-bottom: var(--wm-frame-se) 1px solid;
            cursor: s-resize;
        }

        .wm-frame.active>.wm-s {
            border-bottom: var(--wm-frame-se-active) 1px solid;
        }

        .wm-frame>.wm-sw {
            position: absolute;
            height: 16px;
            left: 0px;
            width: 16px;
            bottom: 0px;
            border-bottom: var(--wm-frame-se) 1px solid;
            border-left: var(--wm-frame-nw) 1px solid;
            cursor: sw-resize;
        }

        .wm-frame.active>.wm-sw {
            border-bottom: var(--wm-frame-se-active) 1px solid;
            border-left: var(--wm-frame-nw-active) 1px solid;
        }

        .wm-frame>.wm-w {
            position: absolute;
            top: 36px;
            left: 0px;
            width: 16px;
            bottom: 16px;
            border-left: var(--wm-frame-nw) 1px solid;
            cursor: w-resize;
        }

        .wm-frame.active>.wm-w {
            border-left: var(--wm-frame-nw-active) 1px solid;
        }

        .wm-frame>.wm-child {
            position: absolute;
            margin: 0;
            background-color: #fff;
            color: #000;
            outline: none;
            border: none;
            overflow: auto;

            min-width: 80px;
            min-height: 50px;
        } 
 
        .wm-icon {
            font-size: calc((10/16) * 1rem);
            position: absolute;
            cursor: move;
            color: #fff;
        }
    </style>
</head>

<body>
    <script type="module" src="src/main.ts"></script>
    <div class="wm-icon" style="left: 732px; top: 244px;">
        <div style="display: flex; justify-content: center;">
            <img src="img/user-home.png" width="32" height="32" />
        </div>
        <div>
            Home
        </div>
    </div>
    <div class="wm-icon" style="left: 720px; top: 308px;">
        <div style="display: flex; justify-content: center;">
            <img src="img/folder-applications.png" width="32" height="32" />
        </div>
        <div>
            Applications
        </div>
    </div>
    <div class="wm-icon" style="left: 720px; top: 372px;">
        <div style="display: flex; justify-content: center;">
            <img src="img/user-trash.png" width="32" height="32" />
        </div>
        <div>
            Recycle Bin
        </div>
    </div>
</body>

</html>
